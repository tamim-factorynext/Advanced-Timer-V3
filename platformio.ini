; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32doit-devkit-v1

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags =
	-I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/SPI/src
	-I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Wire/src
	; Hardware profile (logical channel -> backend channel map).
	; Update these per board variant without touching runtime logic.
	-DAT_PROFILE_NAME=\"esp32doit_gpio_v1\"
	-DAT_PLATFORM_VARIANT=\"ESP32\"
	-DAT_DI_GPIO_LIST=32,33
	-DAT_DO_GPIO_LIST=25,26
	-DAT_AI_GPIO_LIST=34,35
	-DAT_SIO_CAPACITY=2
	-DAT_MATH_CAPACITY=2
	-DAT_RTC_CAPACITY=2
	; Backend codes:
	; DI/DO: 0=GPIO, 1=I2C_EXPANDER, 2=PLUGIN
	; AI:    0=INTERNAL_ADC, 1=I2C_ADC, 2=PLUGIN
	; RTC:   0=RTC_MILLIS, 1=DS3231, 2=PCF8523, 3=DS1307
	-DAT_DI_BACKEND=0
	-DAT_DO_BACKEND=0
	-DAT_AI_BACKEND=0
	-DAT_RTC_BACKEND=0
lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	links2004/WebSockets@^2.6.1
	adafruit/RTClib@^2.1.4
	Wire
	SPI
