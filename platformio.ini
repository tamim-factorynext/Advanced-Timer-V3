; Advanced Timer V3 - ESP32-S3 baseline

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Match common N16R8 module defaults and keep filesys ready.
board_build.flash_mode = dio
board_build.filesystem = littlefs
build_flags =
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/SPI/src
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Wire/src

lib_deps =
  bblanchon/ArduinoJson@^7.4.2
  links2004/WebSockets@^2.6.1
  adafruit/RTClib@^2.1.4
  Wire
  SPI
