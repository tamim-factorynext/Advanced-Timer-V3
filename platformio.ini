; Advanced Timer V4 - ESP32-S3 baseline

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-r8n16-v4
framework = arduino
monitor_speed = 115200

; ESP32-S3 R8N16 target profile (16MB flash + 8MB PSRAM).
board_build.flash_mode = dio
board_build.filesystem = littlefs
board_build.f_cpu = 160000000L

; V4 hardware profile (ESP32-S3 DevKitC-1 baseline).
; These are project defaults for bring-up and can be overridden per board variant.
; Notes:
; - ESP32-S3 routes differ from older ESP32 boards.
; - Keep all runtime logic board-agnostic by reading these compile-time constants.
build_flags =
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/SPI/src
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Wire/src
  -DAT_PLATFORM_VARIANT=\"ESP32S3\"
  -DAT_PROFILE_NAME=\"esp32s3_devkitc1_v4\"

  ; Serial console (UART0 on S3)
  -DAT_PIN_UART0_TX=43
  -DAT_PIN_UART0_RX=44

  ; I2C default bus (Wire)
  -DAT_PIN_I2C_SDA=8
  -DAT_PIN_I2C_SCL=9

  ; SPI default bus (user peripheral SPI)
  -DAT_PIN_SPI_MOSI=11
  -DAT_PIN_SPI_MISO=13
  -DAT_PIN_SPI_SCK=12
  -DAT_PIN_SPI_CS=10

  ; V4 initial logical channel maps (project defaults)
  -DAT_DI_GPIO_LIST=4,5
  -DAT_DO_GPIO_LIST=6,7
  -DAT_AI_GPIO_LIST=1,2

  ; V4 family capacities (compile-time profile gates)
  -DAT_SIO_CAPACITY=2
  -DAT_MATH_CAPACITY=2
  -DAT_RTC_CAPACITY=2

  ; V4 backend selection (future-proofed)
  ; DI/DO backend codes:
  ;   0=GPIO_DIRECT, 1=I2C_EXPANDER, 2=PLUGIN
  ; AI backend codes:
  ;   0=INTERNAL_ADC, 1=I2C_ADC, 2=PLUGIN
  ; RTC backend codes:
  ;   0=RTC_MILLIS, 1=DS3231, 2=PCF8523, 3=DS1307
  ; Notes:
  ; - Current bring-up uses direct/internal defaults.
  ; - Switch to non-GPIO paths (expander/plugin) by changing only these profile flags.
  -DAT_DI_BACKEND=0
  -DAT_DO_BACKEND=0
  -DAT_AI_BACKEND=0
  -DAT_RTC_BACKEND=0

lib_deps =
  bblanchon/ArduinoJson@^7.4.2
  links2004/WebSockets@^2.6.1
  adafruit/RTClib@^2.1.4
  Wire
  SPI
